<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — CreditLens Kenya</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__logo">
      <a href="index.html">📊 CreditLens Kenya</a>
    </div>
    <h2 class="auth-card__title">Welcome back</h2>
    <p class="auth-card__subtitle">Sign in to view your credit health report</p>

    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</div>
      <div class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <div id="auth-alert" class="hidden"></div>

    <form id="signin-form" onsubmit="handleSignIn(event)">
      <div class="form-group">
        <label class="form-label" for="signin-email">Email address</label>
        <input class="form-input" type="email" id="signin-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="signin-password">Password</label>
        <input class="form-input" type="password" id="signin-password" placeholder="Your password" required />
      </div>
      <button type="submit" class="btn btn--primary btn--full btn--lg" id="signin-btn">Sign In</button>
      <p class="auth-footer-text" style="margin-top:1.25rem;">
        No account? <a href="#" onclick="switchTab('signup'); return false;">Create one free</a>
      </p>
    </form>

    <form id="signup-form" class="hidden" onsubmit="handleSignUp(event)">
      <div class="form-group">
        <label class="form-label" for="signup-email">Email address</label>
        <input class="form-input" type="email" id="signup-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="signup-password">Password</label>
        <input class="form-input" type="password" id="signup-password" placeholder="At least 8 characters" minlength="8" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="signup-confirm">Confirm password</label>
        <input class="form-input" type="password" id="signup-confirm" placeholder="Repeat your password" required />
      </div>
      <button type="submit" class="btn btn--primary btn--full btn--lg" id="signup-btn">Create Free Account</button>
      <p class="auth-footer-text" style="margin-top:1.25rem; font-size:0.78rem;">
        By signing up you agree your data is stored securely and never shared with lenders.
      </p>
      <p class="auth-footer-text">Already have an account? <a href="#" onclick="switchTab('signin'); return false;">Sign in</a></p>
    </form>
  </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
