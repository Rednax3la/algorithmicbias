<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In / Sign Up — CreditLens Kenya</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__logo">
      <a href="index.html">📊 CreditLens Kenya</a>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</div>
      <div class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <!-- Error / Success alerts -->
    <div id="auth-alert" class="hidden"></div>

    <!-- Sign In Form -->
    <form id="signin-form" onsubmit="handleSignIn(event)">
      <div class="form-group">
        <label class="form-label" for="signin-email">Email address</label>
        <input class="form-input" type="email" id="signin-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="signin-password">Password</label>
        <input class="form-input" type="password" id="signin-password" placeholder="Your password" required />
      </div>
      <button type="submit" class="btn btn--primary btn--full btn--lg" id="signin-btn">
        Sign In
      </button>
      <p class="auth-footer-text" style="margin-top: 1.25rem;">
        Don't have an account? <a href="#" onclick="switchTab('signup'); return false;">Sign up free</a>
      </p>
    </form>

    <!-- Sign Up Form -->
    <form id="signup-form" class="hidden" onsubmit="handleSignUp(event)">
      <div class="form-group">
        <label class="form-label" for="signup-email">Email address</label>
        <input class="form-input" type="email" id="signup-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="signup-password">Password</label>
        <input class="form-input" type="password" id="signup-password" placeholder="At least 8 characters" minlength="8" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="signup-confirm">Confirm password</label>
        <input class="form-input" type="password" id="signup-confirm" placeholder="Repeat your password" required />
      </div>
      <button type="submit" class="btn btn--primary btn--full btn--lg" id="signup-btn">
        Create Free Account
      </button>
      <p class="auth-footer-text" style="margin-top: 1.25rem; font-size: 0.78rem; color: var(--text-muted);">
        By signing up you agree that your data is stored securely and never shared with lenders.
      </p>
      <p class="auth-footer-text">
        Already have an account? <a href="#" onclick="switchTab('signin'); return false;">Sign in</a>
      </p>
    </form>

  </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
